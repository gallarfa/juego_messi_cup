<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messi Cup - Dino Runner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <div class="header-left">
                <a href="../index.html" class="back-btn">← Volver al Portfolio</a>
                <h1>Messi Cup</h1>
            </div>
            <div class="score-board">
                <div class="score-box">
                    <span class="score-label">Copas</span>
                    <span id="score" class="score-value">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">Récord</span>
                    <span id="high-score" class="score-value">0</span>
                </div>
            </div>
        </header>

        <main class="canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="overlay" class="overlay">
                <h2 id="overlay-title">Messi Cup 🏆</h2>
                <div class="messi-art-preview">
                    <!-- Dibujo dinámico de Messi Dennis-style -->
                    <div class="cartoon-messi">
                        <div class="hair-spikes"></div>
                        <div class="face">
                            <div class="eye left"></div>
                            <div class="eye right"></div>
                            <div class="smile"></div>
                        </div>
                    </div>
                </div>
                <p id="overlay-desc">¡Messi corre con la pelota! Salta para esquivar rivales y tarjetas rojas.</p>
                <div class="controls-guide">
                    <div class="guide-item">
                        <span class="key">Espacio / ▲ / Tap</span>
                        <span class="action">Saltar</span>
                    </div>
                </div>
                <button id="start-btn" class="primary-btn">Jugar</button>
            </div>
        </main>

        <!-- Controles táctiles móviles -->
        <div class="mobile-controls">
            <button id="jump-btn" class="primary-btn mobile-jump" style="margin-top:6px;">⤴️ Saltar</button>
        </div>

        <footer class="game-footer">
            <p>Esquiva a los rivales y las tarjetas rojas saltando a tiempo. ¡Junta Copas del Mundo para sumar 5 puntos extra!</p>
        </footer>
    </div>

    <!-- Botón de Sonido Flotante -->
    <button id="sound-toggle" class="sound-btn" title="Activar/Desactivar Sonido">🔊</button>

    <script src="script.js"></script>
</body>
</html>
